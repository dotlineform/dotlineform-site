---
layout: default
title: Studio Series
permalink: /studio/studio-series/
section: works
---

<link rel="stylesheet" href="{{ '/assets/css/studio.css' | relative_url }}">

<div class="index worksList seriesCuratorList tagStudioIndex" id="tagStudioRoot" hidden>
  <h1 class="index__heading visually-hidden">studio series</h1>
  <div class="worksList__metaRow">
    <p class="worksList__count" id="tagStudioCount"></p>
    <a class="worksList__metaLink" href="{{ '/site_map/' | relative_url }}">site map</a>
  </div>

  <div class="worksList__head" role="group" aria-label="Sort studio series">
    <button class="worksList__sortBtn" type="button" data-sort-key="year">
      year <span class="worksList__sortIcon" aria-hidden="true"></span>
    </button>
    <span class="worksList__headLabel">status</span>
    <button class="worksList__sortBtn" type="button" data-sort-key="title">
      title <span class="worksList__sortIcon" aria-hidden="true"></span>
    </button>
  </div>

  <ul class="worksList__list" id="tagStudioList"></ul>
</div>
<p id="tagStudioEmpty" hidden>no studio series pages yet</p>

<script>
  (function () {
    var root = document.getElementById('tagStudioRoot');
    var emptyEl = document.getElementById('tagStudioEmpty');
    var list = document.getElementById('tagStudioList');
    var countEl = document.getElementById('tagStudioCount');
    if (!root || !emptyEl || !list || !countEl) return;
    var buttons = Array.prototype.slice.call(root.querySelectorAll('.worksList__sortBtn'));
    if (!buttons.length) return;

    var baseurl = {{ site.baseurl | default: '' | jsonify }};
    var seriesIndexUrl = baseurl + '/assets/data/series_index.json';
    var validKeys = { year: true, title: true };
    var collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
    var params = new URLSearchParams(window.location.search);
    var sortKey = String(params.get('sort') || 'title').toLowerCase();
    var sortDir = String(params.get('dir') || 'asc').toLowerCase();
    if (!validKeys[sortKey]) sortKey = 'title';
    if (sortDir !== 'asc' && sortDir !== 'desc') sortDir = 'asc';

    function fetchJson(url) {
      return fetch(url, { cache: 'default' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
    }

    function normalizeText(v) {
      return String(v == null ? '' : v).trim();
    }

    function numericAwareSortKey(v) {
      return normalizeText(v).replace(/\d+/g, function (m) {
        return m.padStart(3, '0');
      });
    }

    function compareValues(a, b, key) {
      if (key === 'year') {
        var av = Number(a.getAttribute('data-year') || '0');
        var bv = Number(b.getAttribute('data-year') || '0');
        return av - bv;
      }
      var as = String(a.getAttribute('data-' + key) || '');
      var bs = String(b.getAttribute('data-' + key) || '');
      return collator.compare(as, bs);
    }

    function applySort(key, dir) {
      var rows = Array.prototype.slice.call(list.querySelectorAll('.worksList__item'));
      rows.sort(function (a, b) {
        var primary = compareValues(a, b, key);
        if (primary !== 0) return dir === 'asc' ? primary : -primary;
        return compareValues(a, b, 'title');
      });
      list.innerHTML = '';
      rows.forEach(function (row) { list.appendChild(row); });
    }

    function updateHeaderState(key, dir) {
      buttons.forEach(function (btn) {
        var btnKey = btn.getAttribute('data-sort-key');
        var icon = btn.querySelector('.worksList__sortIcon');
        var active = (btnKey === key);
        btn.classList.toggle('is-active', active);
        if (!icon) return;
        icon.textContent = active ? (dir === 'asc' ? '▲' : '▼') : '';
      });
    }

    function persist(key, dir) {
      var next = new URLSearchParams(window.location.search);
      next.set('sort', key);
      next.set('dir', dir);
      var query = next.toString();
      var path = String(window.location.pathname || '/');
      path = '/' + path.replace(/^\/+/, '').replace(/\/{2,}/g, '/');
      var nextUrl = path + (query ? ('?' + query) : '') + window.location.hash;
      window.history.replaceState({}, '', nextUrl);
    }

    function makeSeriesRow(seriesId, seriesRow) {
      var sid = normalizeText(seriesId);
      if (!sid) return null;
      var yearVal = Number(seriesRow && seriesRow.year);
      if (!Number.isFinite(yearVal)) yearVal = 0;
      var yearDisplay = normalizeText(seriesRow && seriesRow.year_display) || normalizeText(seriesRow && seriesRow.year) || '—';
      var titleRaw = normalizeText(seriesRow && seriesRow.title) || sid;
      var titleSortRaw = normalizeText(seriesRow && seriesRow.title_sort);
      var titleSort = (titleSortRaw || numericAwareSortKey(titleRaw)).toLowerCase();

      var li = document.createElement('li');
      li.className = 'worksList__item';
      li.setAttribute('data-series-id', sid);
      li.setAttribute('data-year', String(yearVal));
      li.setAttribute('data-title', titleSort);

      var yearSpan = document.createElement('span');
      yearSpan.className = 'worksList__year';
      yearSpan.textContent = yearDisplay;
      li.appendChild(yearSpan);

      var statusWrap = document.createElement('span');
      statusWrap.className = 'tagStudioIndex__statusWrap';
      var statusDot = document.createElement('span');
      statusDot.className = 'rag rag--red';
      statusDot.setAttribute('title', 'loading tag status...');
      statusDot.setAttribute('aria-label', 'loading tag status');
      statusDot.setAttribute('data-rag-indicator', '');
      statusWrap.appendChild(statusDot);
      li.appendChild(statusWrap);

      var titleA = document.createElement('a');
      titleA.className = 'worksList__title';
      titleA.href = baseurl + '/studio/studio-series/' + encodeURIComponent(sid) + '/';
      titleA.textContent = titleRaw;
      li.appendChild(titleA);

      return li;
    }

    function renderFromJson(payload) {
      var seriesMap = (payload && payload.series && typeof payload.series === 'object') ? payload.series : {};
      var rows = [];

      Object.keys(seriesMap).forEach(function (seriesId) {
        var row = makeSeriesRow(seriesId, seriesMap[seriesId]);
        if (!row) return;
        rows.push(row);
      });

      list.innerHTML = '';
      if (!rows.length) return false;
      var frag = document.createDocumentFragment();
      rows.forEach(function (row) { frag.appendChild(row); });
      list.appendChild(frag);
      countEl.textContent = String(rows.length) + ' series';
      return true;
    }

    function initSortUi() {
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var key = String(btn.getAttribute('data-sort-key') || '').toLowerCase();
          if (!validKeys[key]) return;
          if (key === sortKey) {
            sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
          } else {
            sortKey = key;
            sortDir = 'asc';
          }
          applySort(sortKey, sortDir);
          updateHeaderState(sortKey, sortDir);
          persist(sortKey, sortDir);
        });
      });

      applySort(sortKey, sortDir);
      updateHeaderState(sortKey, sortDir);
      persist(sortKey, sortDir);
    }

    fetchJson(seriesIndexUrl)
      .then(function (payload) {
        var hasRows = renderFromJson(payload);
        if (!hasRows) {
          root.hidden = true;
          emptyEl.hidden = false;
          return;
        }
        root.hidden = false;
        emptyEl.hidden = true;
        initSortUi();
      })
      .catch(function (err) {
        console.error('studio_series_index: render failed', err);
        root.hidden = true;
        emptyEl.hidden = false;
      });
  })();
</script>
<script type="module" src="{{ '/assets/js/tag-studio-index.js' | relative_url }}"></script>
