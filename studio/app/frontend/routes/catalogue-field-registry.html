<div
  class="studioPage fieldRegistryReviewPage"
  id="fieldRegistryReviewRoot"
  hidden
  data-studio-ready="false"
  data-studio-busy="false"
>
  <section class="studioUi__panel studioUi__panel--editor">
    <div class="studioUi__headingRow">
      <h2 class="studioUi__heading" id="fieldRegistryReviewHeading">catalogue field registry</h2>
    </div>
    <p class="studioUi__contextHint" id="fieldRegistryReviewContext"></p>
    <p class="studioUi__status" id="fieldRegistryReviewStatus"></p>
  </section>

  <section class="studioUi__panel studioUi__panel--editor">
    <div class="studioUi__inputRow studioUi__inputRow--editor">
      <label class="visually-hidden" for="fieldRegistryReviewSearch">Search by field name</label>
      <input
        type="search"
        class="studioUi__input"
        id="fieldRegistryReviewSearch"
        placeholder="field name"
        autocomplete="off"
      >
    </div>
    <p class="studioForm__meta" id="fieldRegistryReviewMeta"></p>
    <label class="studioForm__field studioForm__field--topAligned fieldRegistryReviewPage__outputField" for="fieldRegistryReviewOutput">
      <span class="studioForm__label" id="fieldRegistryReviewOutputLabel">registry extract</span>
      <textarea class="studioUi__input fieldRegistryReviewPage__output" id="fieldRegistryReviewOutput" readonly spellcheck="false"></textarea>
    </label>
  </section>
</div>

<p class="studioUi__status" id="fieldRegistryReviewLoading">loading catalogue field registry...</p>
<p class="studioUi__empty" id="fieldRegistryReviewEmpty" hidden></p>
