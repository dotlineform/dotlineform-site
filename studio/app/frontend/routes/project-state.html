<div
  class="studioPage catalogueWorkPage"
  id="projectStateRoot"
  hidden
  data-studio-ready="false"
  data-studio-busy="false"
>
  <section class="studioUi__panel studioUi__panel--editor">
    <div class="studioUi__headingRow">
      <h2 class="studioUi__heading" id="projectStatePageHeading">project state</h2>
    </div>
    <p class="studioUi__contextHint" id="projectStateContext"></p>
    <p class="studioUi__status" id="projectStateStatus"></p>
    <p class="studioUi__saveWarning" id="projectStateWarning"></p>
    <p class="studioUi__saveResult" id="projectStateResult"></p>
  </section>

  <div class="studioUi__grid catalogueWorkPage__grid">
    <section class="studioUi__panel studioUi__panel--editor">
      <div class="studioUi__headingRow">
        <h2 class="studioUi__heading" id="projectStateRunHeading">report</h2>
        <div class="catalogueWorkPage__actions">
          <button type="button" class="studioUi__button studioUi__button--defaultWidth" id="projectStateRunButton">Run</button>
        </div>
      </div>
      <div class="studioForm__fields catalogueWorkForm__fields">
        <div class="studioForm__field">
          <span class="studioForm__label" id="projectStateOutputLabel">output</span>
          <span class="studioUi__input studioUi__input--readonlyDisplay" id="projectStateOutputPath">var/studio/reports/project-state.md</span>
        </div>
        <div class="studioForm__field">
          <span class="studioForm__label" id="projectStateSourceLabel">source</span>
          <span class="studioUi__input studioUi__input--readonlyDisplay" id="projectStateSourceRoot">$DOTLINEFORM_PROJECTS_BASE_DIR/projects</span>
        </div>
        <label class="catalogueWorkPage__updateToggle" for="projectStateIncludeSubfolders">
          <input type="checkbox" id="projectStateIncludeSubfolders">
          <span id="projectStateIncludeSubfoldersLabel">include sub-folders</span>
        </label>
      </div>
    </section>

    <aside class="studioUi__panel catalogueWorkSummary">
      <h2 class="studioUi__heading" id="projectStateSummaryHeading">summary</h2>
      <div class="studioForm__fields" id="projectStateSummary"></div>
      <div class="catalogueWorkPage__actions">
        <button type="button" class="studioUi__button studioUi__button--defaultWidth" id="projectStateOpenButton">Open file</button>
      </div>
    </aside>
  </div>
</div>

<p class="studioUi__status" id="projectStateLoading">loading project state...</p>
<p class="studioUi__empty" id="projectStateEmpty" hidden></p>
