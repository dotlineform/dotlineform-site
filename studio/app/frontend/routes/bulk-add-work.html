<div
  class="studioPage catalogueWorkPage"
  id="bulkAddWorkRoot"
  data-workbook-path="data/works_bulk_import.xlsx"
  hidden
  data-studio-ready="false"
  data-studio-busy="false"
>
  <section class="studioUi__panel studioUi__panel--editor">
    <div class="studioUi__headingRow">
      <h2 class="studioUi__heading" id="bulkAddWorkPageHeading">bulk add work</h2>
    </div>

    <p class="studioUi__contextHint" id="bulkAddWorkContext"></p>
    <p class="studioUi__status" id="bulkAddWorkStatus"></p>
    <p class="studioUi__saveWarning" id="bulkAddWorkWarning"></p>
    <p class="studioUi__saveResult" id="bulkAddWorkResult"></p>
  </section>

  <div class="studioUi__grid catalogueWorkPage__grid">
    <section class="studioUi__panel studioUi__panel--editor">
      <div class="studioUi__headingRow">
        <h2 class="studioUi__heading" id="bulkAddWorkImportHeading">import</h2>
        <div class="catalogueWorkPage__actions">
          <button type="button" class="studioUi__button studioUi__button--defaultWidth" id="bulkAddWorkPreview">Preview</button>
          <button type="button" class="studioUi__button studioUi__button--defaultWidth" id="bulkAddWorkApply">Import</button>
        </div>
      </div>
      <div class="studioForm__fields catalogueWorkForm__fields" id="bulkAddWorkFields">
        <label class="studioForm__field catalogueWorkForm__field" for="bulkAddWorkMode">
          <span class="studioForm__label" id="bulkAddWorkModeLabel">mode</span>
          <select class="studioUi__input" id="bulkAddWorkMode">
            <option value="works" id="bulkAddWorkModeWorks">works</option>
            <option value="work_details" id="bulkAddWorkModeWorkDetails">work details</option>
          </select>
        </label>
        <div class="studioForm__field">
          <span class="studioForm__label" id="bulkAddWorkWorkbookLabel">workbook</span>
          <span class="studioUi__input studioUi__input--readonlyDisplay" id="bulkAddWorkWorkbook">data/works_bulk_import.xlsx</span>
        </div>
      </div>
    </section>

    <aside class="studioUi__panel catalogueWorkSummary">
      <h2 class="studioUi__heading" id="bulkAddWorkSummaryHeading">preview summary</h2>
      <div class="studioForm__fields" id="bulkAddWorkSummary"></div>
    </aside>
  </div>

  <section class="studioUi__panel catalogueWorkDetails">
    <div class="studioUi__headingRow">
      <h2 class="studioUi__heading" id="bulkAddWorkDetailsHeading">preview details</h2>
    </div>
    <div class="catalogueWorkDetails__results" id="bulkAddWorkPreviewDetails"></div>
  </section>
</div>

<p class="studioUi__status" id="bulkAddWorkLoading">loading bulk add work...</p>
<p class="studioUi__empty" id="bulkAddWorkEmpty" hidden></p>
