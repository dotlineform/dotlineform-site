__LOCAL_BROWSER_ICON_LINKS__
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
      } catch (error) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="/shared/frontend/css/search-list.css?v=__STUDIO_ASSET_VERSION__">
  <link rel="stylesheet" href="/shared/frontend/css/file-picker.css?v=__STUDIO_ASSET_VERSION__">

  <link rel="stylesheet" href="/studio/app/assets/css/studio.css?v=__STUDIO_ASSET_VERSION__">
</head>

  <div id="studioApp" data-studio-app-root="true"></div>
  <script type="module" src="/studio/app/frontend/js/studio-app.js?v=__STUDIO_ASSET_VERSION__"></script>
</body>
</html>
