<!doctype html>

<head>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#111111">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', (t === 'light' || t === 'dark') ? t : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/assets/css/main.css?v=static">
  <link rel="stylesheet" href="/docs-viewer/static/css/docs-viewer.css?v=docs-toolbar-20260617">
</head>
<body class="analysis">
  <header class="site-header">
    <div class="container">
      <div class="site-title">
        <a href="/">dotlineform</a>
      </div>
      <div class="siteHeader__actions">
        <nav class="site-nav" aria-label="Primary">
          <a class="nav-item" href="/series/">works</a>
          <span class="nav-item is-active" aria-current="page">analysis</span>
          <a class="nav-item" href="/library/">library</a>
        </nav>
        <button class="siteThemeToggle" type="button" id="themeToggle" aria-label="Switch to dark mode" title="Switch to dark mode">
          <svg class="siteThemeToggle__icon" data-theme-icon="light" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="M4.93 4.93l1.41 1.41"></path>
            <path d="M17.66 17.66l1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="M4.93 19.07l1.41-1.41"></path>
            <path d="M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="siteThemeToggle__icon" data-theme-icon="dark" viewBox="0 0 24 24" aria-hidden="true" hidden>
            <path d="M21 12.79A8.5 8.5 0 1 1 11.21 3 6.5 6.5 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section
      class="docsViewer"
      id="docsViewerRoot"
      data-route-id="analysis"
      data-route-config-url="/docs-viewer/config/routes/docs-viewer-public-routes.json"
    >
      <div class="docsViewer__controls">
        <div
          id="docsViewerHeaderControlsMount"
          data-docs-viewer-header-controls-mount
          data-enable-search="true"
          data-search-placeholder="search analysis"
          data-search-aria-label="Search analysis"
        ></div>
        <p class="docsViewer__status muted small" id="docsViewerStatus" hidden></p>
        <div class="docsViewer__bookmarkRow" id="docsViewerBookmarkRow" hidden></div>
      </div>
      <div id="docsViewerIndexPanelMount" data-docs-viewer-index-panel-mount></div>
      <div id="docsViewerMainViewMount" data-docs-viewer-main-view-mount>
        <noscript>This docs viewer requires JavaScript to load the generated docs index.</noscript>
      </div>
      <div id="docsViewerInfoPanelMount" data-docs-viewer-info-panel-mount></div>
    </section>
    <script type="module" src="/docs-viewer/runtime/js/public/docs-viewer-public.js?v=docs-toolbar-20260617"></script>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span class="muted">&copy; 2026 dotlineform &middot; <a href="/about/">about</a></span>
    </div>
  </footer>

<script src="/assets/js/site-nav.js?v=static"></script>
<script src="/assets/js/theme-toggle.js?v=static"></script>
