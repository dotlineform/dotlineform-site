<link rel="stylesheet" href="/docs-viewer/static/css/docs-viewer.css?v=__DOCS_VIEWER_ASSET_VERSION__">
<link rel="stylesheet" href="/docs-viewer/static/css/docs-viewer-reports.css?v=__DOCS_VIEWER_ASSET_VERSION__">
__DOCS_VIEWER_MANAGEMENT_STYLESHEET__

<section
  class="docsViewer"
  id="docsViewerRoot"
  data-allow-management="__DOCS_VIEWER_ALLOW_MANAGEMENT__"
  data-route-id="docs-manage"
  data-route-config-url="/docs-viewer/config/routes/docs-viewer-routes.json"
>
  <div class="docsViewer__controls">
    <div
      id="docsViewerHeaderControlsMount"
      data-docs-viewer-header-controls-mount
      data-enable-search="true"
      data-search-placeholder="search docs"
      data-search-aria-label="Search docs"
    ></div>
    <p class="docsViewer__status muted small" id="docsViewerStatus" hidden></p>
    <div class="docsViewer__bookmarkRow" id="docsViewerBookmarkRow" hidden></div>
  </div>

  <div id="docsViewerIndexPanelMount" data-docs-viewer-index-panel-mount></div>
  __DOCS_VIEWER_MANAGEMENT_MOUNT__
  <div id="docsViewerMainViewMount" data-docs-viewer-main-view-mount>
    <noscript>This docs viewer requires JavaScript to load the generated docs index.</noscript>
  </div>
  <div id="docsViewerInfoPanelMount" data-docs-viewer-info-panel-mount></div>
</section>

<script type="module" src="/docs-viewer/runtime/js/management/docs-viewer-manage.js?v=__DOCS_VIEWER_ASSET_VERSION__"></script>
