# Local-only overlay used by bin/dev-studio.
# Keep public builds on _config.yml so generated docs/search JSON is still published.
docs_viewer_generated_base_url: "http://127.0.0.1:8789"
docs_viewer_management_enabled: true

exclude:
  - scripts
  - _site
  - vendor
  - node_modules
  - .bundle
  - tests
  - var
  - logs
  - assets/studio/data/catalogue/
  - assets/studio/data/catalogue_lookup/
  - assets/data/docs/scopes/
  - assets/data/search/studio/
  - assets/data/search/library/
  - assets/data/search/analysis/
