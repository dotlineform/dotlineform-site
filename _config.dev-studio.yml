# Local-only overlay used by bin/dev-studio.
# Keep public builds on _config.yml so generated docs/search JSON is still published.
docs_viewer_generated_base_url: "http://127.0.0.1:8765/studio/api/docs"
docs_viewer_management_base_url: "http://127.0.0.1:8765/studio/api/docs"
docs_viewer_management_enabled: true
docs_viewer_config_url: "/assets/docs-viewer/data/docs-viewer-config.json"

exclude:
  - scripts
  - _site
  - vendor
  - node_modules
  - .bundle
  - .pytest_cache
  - tests
  - var
  - logs
  - assets/studio/data/tag_aliases.json
  - assets/studio/data/tag_assignments.json
  - assets/studio/data/tag_groups.json
  - assets/studio/data/tag_registry.json
  - assets/studio/data/catalogue/
  - assets/studio/data/catalogue_lookup/
  - assets/data/docs/scopes/
  - assets/data/search/studio/
  - assets/data/search/library/
  - assets/data/search/analysis/
