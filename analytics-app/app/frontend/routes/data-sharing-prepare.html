<div
  class="analyticsPage dataSharingPreparePage"
  id="dataSharingPrepareRoot"
  hidden
  data-analytics-ready="false"
  data-analytics-busy="false"
>
  <div class="analytics__panel dataSharingPreparePage__panel">
    <div class="dataSharingPreparePage__controls">
      <div class="dataSharingPreparePage__buttonGroup">
        <button type="button" class="analytics__button analytics__button--defaultWidth" id="dataSharingPrepareRun"></button>
        <p class="analytics__status" id="dataSharingPrepareStatus"></p>
      </div>
      <div class="dataSharingPreparePage__dropdownGroup">
        <label class="dataSharingPreparePage__choiceField" for="dataSharingPrepareAppSelect">
          <span class="visually-hidden" id="dataSharingPrepareAppLabel"></span>
          <span class="analyticsField__control">
            <select class="analytics__input dataSharingPreparePage__listbox" id="dataSharingPrepareAppSelect" size="5"></select>
          </span>
        </label>
        <label class="dataSharingPreparePage__choiceField" for="dataSharingPrepareDataDomainSelect">
          <span class="visually-hidden" id="dataSharingPrepareDataDomainLabel"></span>
          <span class="analyticsField__control">
            <select class="analytics__input dataSharingPreparePage__listbox" id="dataSharingPrepareDataDomainSelect" size="5"></select>
          </span>
        </label>
        <label class="dataSharingPreparePage__choiceField" for="dataSharingPrepareConfigSelect">
          <span class="visually-hidden" id="dataSharingPrepareConfigLabel"></span>
          <span class="analyticsField__control">
            <select class="analytics__input dataSharingPreparePage__listbox" id="dataSharingPrepareConfigSelect" size="5"></select>
          </span>
        </label>
      </div>
      <label class="analyticsField dataSharingPreparePage__format" id="dataSharingPrepareFormatWrap" for="dataSharingPrepareFormatSelect">
        <span class="analyticsField__label dataSharingPreparePage__formatLabel" id="dataSharingPrepareFormatLabel"></span>
        <span class="analyticsField__control">
          <select class="analytics__input dataSharingPreparePage__compactSelect" id="dataSharingPrepareFormatSelect"></select>
        </span>
      </label>
      <div class="dataSharingPreparePage__optionsGroup" id="dataSharingPrepareOptionsGroup" hidden>
        <label class="analyticsField dataSharingPreparePage__docsScopeField" for="dataSharingPrepareDocsScopeSelect">
          <span class="analyticsField__label" id="dataSharingPrepareDocsScopeLabel"></span>
          <span class="analyticsField__control">
            <select class="analytics__input dataSharingPreparePage__compactSelect" id="dataSharingPrepareDocsScopeSelect"></select>
          </span>
        </label>
        <label class="dataSharingPreparePage__toggle" id="dataSharingPrepareMissingSummaryWrap" hidden>
          <input type="checkbox" id="dataSharingPrepareMissingSummaryOnly">
          <span id="dataSharingPrepareMissingSummaryLabel"></span>
        </label>
      </div>
    </div>

    <div class="dataSharingPreparePage__listActions" aria-label="Share package document selection actions">
      <span class="dataSharingPreparePage__filterPills" id="dataSharingPrepareListFilters" aria-label="Data Sharing list filters"></span>
      <button type="button" class="analytics__keyPill analyticsFilters__groupBtn" id="dataSharingPrepareSelectAll"></button>
      <button type="button" class="analytics__keyPill analyticsFilters__groupBtn" id="dataSharingPrepareClear"></button>
      <p class="analyticsForm__meta dataSharingPreparePage__selectionSummary" id="dataSharingPrepareSelectionSummary"></p>
    </div>

    <div class="analyticsList dataSharingPrepareList" id="dataSharingPrepareList"></div>
    <div data-analytics-modal-host="true"></div>
  </div>
</div>

<p class="analytics__status" id="dataSharingPrepareBootStatus">loading Data Sharing...</p>
