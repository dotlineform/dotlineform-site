<section
  class="docsViewer"
  id="docsViewerRoot"
  data-index-url="{{ include.index_url }}"
  data-viewer-base-url="{{ include.viewer_base_url }}"
  data-viewer-scope="{{ include.viewer_scope | default: '' }}"
  data-include-scope-param="{{ include.include_scope_param | default: false }}"
  data-default-doc-id="{{ include.default_doc_id | default: '' }}"
  data-search-index-url="{{ include.search_index_url | default: '' }}"
  data-studio-config-url="{{ include.studio_config_url | default: '/assets/studio/data/studio_config.json' | relative_url }}"
  data-management-base-url="{{ include.management_base_url | default: '' }}"
>
  <div class="docsViewer__controls">
    {%- if include.search_index_url -%}
    <div class="docsViewer__searchRow">
      <button class="docsViewer__actionButton docsViewer__recentButton" type="button" id="docsViewerRecentButton" aria-pressed="false">recently added</button>
      <div class="docsViewer__search">
        <label class="visually-hidden" for="docsViewerSearchInput">{{ include.search_aria_label | default: 'Search docs' }}</label>
        <input
          class="docsViewer__searchInput"
          id="docsViewerSearchInput"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="{{ include.search_placeholder | default: 'search docs' }}"
          aria-label="{{ include.search_aria_label | default: 'Search docs' }}"
        >
      </div>
    </div>
    {%- endif -%}
    <div class="docsViewer__manageRow" id="docsViewerManageRow" hidden>
      <div class="docsViewer__manageActions">
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageRebuildButton">Rebuild docs</button>
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageNewButton">New</button>
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageEditButton">Edit</button>
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageArchiveButton">Archive</button>
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageDeleteButton">Delete</button>
        <button class="docsViewer__actionButton" type="button" id="docsViewerManageViewableButton">Make viewable</button>
        <label class="docsViewer__draftToggle">
          <input class="docsViewer__draftInput" id="docsViewerDraftToggle" type="checkbox">
          <span class="docsViewer__draftLabel">drafts</span>
        </label>
      </div>
      <p class="docsViewer__manageNote muted small" id="docsViewerManageNote"></p>
    </div>
    <div class="docsViewer__bookmarkRow" id="docsViewerBookmarkRow" hidden></div>
    <p class="docsViewer__status muted small" id="docsViewerStatus">Loading docs...</p>
  </div>

  <aside class="docsViewer__sidebar" aria-label="Docs index">
    <div class="docsViewer__sidebarInner">
      <div class="docsViewer__sidebarHeader">
        <button
          class="docsViewer__indexUndoButton"
          type="button"
          id="docsViewerIndexUndoButton"
          aria-label="Undo move"
          title="Undo move"
          disabled
          hidden
        >
          <svg class="docsViewer__indexUndoIcon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M9 7H5v4"></path>
            <path d="M5 7c2.8-2.7 7.2-2.8 10.1-0.2 2.9 2.6 3.1 7.1 0.5 10"></path>
          </svg>
        </button>
        <button
          class="docsViewer__sidebarToggle"
          type="button"
          id="docsViewerSidebarToggle"
          aria-controls="docsViewerNav"
          aria-expanded="true"
          aria-label="Collapse docs index"
          title="Collapse docs index"
        >
          <span class="docsViewer__sidebarToggleIcon" aria-hidden="true">‹</span>
        </button>
      </div>
      <nav class="docsViewer__nav" id="docsViewerNav" aria-label="Docs tree"></nav>
    </div>
  </aside>
  <div class="docsViewer__contextMenu" id="docsViewerContextMenu" hidden>
    <button class="docsViewer__contextAction" type="button" data-context-action="open">Open</button>
    <button class="docsViewer__contextAction" type="button" data-context-action="open-vscode">Open In VS Code</button>
    <div class="docsViewer__contextDivider" aria-hidden="true"></div>
    <button class="docsViewer__contextAction" type="button" data-context-action="new-sibling">New Sibling</button>
    <button class="docsViewer__contextAction" type="button" data-context-action="new-child">New Child</button>
  </div>
  <div class="docsViewer__modal" id="docsViewerMetadataModal" hidden>
    <div class="docsViewer__modalBackdrop" data-metadata-close="true"></div>
    <div class="docsViewer__modalCard" role="dialog" aria-modal="true" aria-labelledby="docsViewerMetadataHeading">
      <div class="docsViewer__modalHeader">
        <div class="docsViewer__modalHeaderCopy">
          <h2 class="docsViewer__modalTitle" id="docsViewerMetadataHeading">Edit metadata</h2>
          <p class="docsViewer__modalMeta muted small" id="docsViewerMetadataDocId"></p>
        </div>
        <button class="docsViewer__modalClose" type="button" id="docsViewerMetadataCloseButton" aria-label="Close metadata editor">×</button>
      </div>
      <form class="docsViewer__modalForm" id="docsViewerMetadataForm">
        <label class="docsViewer__field">
          <span class="docsViewer__fieldLabel">title</span>
          <input class="docsViewer__fieldInput" id="docsViewerMetadataTitleInput" name="title" type="text" autocomplete="off" spellcheck="false" required>
        </label>
        <label class="docsViewer__field">
          <span class="docsViewer__fieldLabel">parent</span>
          <select class="docsViewer__fieldInput" id="docsViewerMetadataParentInput" name="parent_id"></select>
        </label>
        <label class="docsViewer__field">
          <span class="docsViewer__fieldLabel">sort order</span>
          <input class="docsViewer__fieldInput" id="docsViewerMetadataSortOrderInput" name="sort_order" type="number" step="1" inputmode="numeric" placeholder="blank">
        </label>
        <p class="docsViewer__modalNote muted small" id="docsViewerMetadataNote">Blank sort order leaves the doc unordered.</p>
        <div class="docsViewer__modalActions">
          <button class="docsViewer__actionButton" type="button" id="docsViewerMetadataCancelButton">Cancel</button>
          <button class="docsViewer__actionButton" type="submit" id="docsViewerMetadataSaveButton">Save</button>
        </div>
      </form>
    </div>
  </div>

  <article class="docsViewer__main" aria-live="polite">
    <div class="docsViewer__meta" id="docsViewerMeta" hidden>
      <div class="docsViewer__metaRow">
        <div class="docsViewer__metaCopy">
          <p class="docsViewer__path small" id="docsViewerPath"></p>
          <p class="docsViewer__updated muted small" id="docsViewerUpdated"></p>
        </div>
        <button class="docsViewer__bookmarkToggle" id="docsViewerBookmarkToggle" type="button" hidden aria-label="Add bookmark" aria-pressed="false" title="Add bookmark">☆</button>
      </div>
    </div>
    <div class="docsViewer__content content" id="docsViewerContent">
      <noscript>This docs viewer requires JavaScript to load the generated docs index.</noscript>
    </div>
    <ol class="docsViewer__results" id="docsViewerResults" hidden></ol>
    <div class="docsViewer__more" id="docsViewerMore" hidden></div>
  </article>
</section>

<script src="{{ '/assets/js/docs-viewer.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
