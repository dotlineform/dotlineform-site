<link rel="stylesheet" href="{{ '/docs-viewer/static/css/docs-viewer-base.css' | relative_url }}?v={{ site.time | date: '%s' }}">
<link rel="stylesheet" href="{{ '/docs-viewer/static/css/docs-viewer.css' | relative_url }}?v={{ site.time | date: '%s' }}">
<link rel="stylesheet" href="{{ '/docs-viewer/static/css/docs-viewer-reports.css' | relative_url }}?v={{ site.time | date: '%s' }}">
{%- if include.allow_management -%}
<link rel="stylesheet" href="{{ '/docs-viewer/static/css/docs-viewer-management.css' | relative_url }}?v={{ site.time | date: '%s' }}">
{%- endif -%}
{%- assign docs_viewer_route_config_url = include.route_config_url | default: site.docs_viewer_route_config_url | default: '/docs-viewer/config/routes/docs-viewer-routes.json' -%}

<section
  class="docsViewer"
  id="docsViewerRoot"
  data-route-id="{{ include.route_id | default: '' }}"
  data-route-config-url="{{ docs_viewer_route_config_url | relative_url }}"
>
  <div class="docsViewer__controls">
    <div
      id="docsViewerHeaderControlsMount"
      data-docs-viewer-header-controls-mount
      data-enable-search="{%- if include.enable_search == false -%}false{%- else -%}true{%- endif -%}"
      data-search-placeholder="{{ include.search_placeholder | default: 'search docs' }}"
      data-search-aria-label="{{ include.search_aria_label | default: 'Search docs' }}"
    ></div>
    <p class="docsViewer__status muted small" id="docsViewerStatus" hidden></p>
    <div class="docsViewer__bookmarkRow" id="docsViewerBookmarkRow" hidden></div>
  </div>

  <div id="docsViewerIndexPanelMount" data-docs-viewer-index-panel-mount></div>
  <div id="docsViewerManagementShellMount" data-docs-viewer-management-shell-mount></div>
  <div id="docsViewerDocumentShellMount" data-docs-viewer-document-shell-mount>
    <noscript>This docs viewer requires JavaScript to load the generated docs index.</noscript>
  </div>
  <div id="docsViewerInfoPanelMount" data-docs-viewer-info-panel-mount></div>
</section>

<script type="module" src="{{ '/docs-viewer/runtime/js/docs-viewer.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
