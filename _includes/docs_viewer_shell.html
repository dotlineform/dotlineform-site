<section
  class="docsViewer"
  id="docsViewerRoot"
  data-index-url="{{ include.index_url }}"
  data-viewer-base-url="{{ include.viewer_base_url }}"
  data-viewer-scope="{{ include.viewer_scope | default: '' }}"
  data-include-scope-param="{{ include.include_scope_param | default: false }}"
  data-default-doc-id="{{ include.default_doc_id | default: '' }}"
  data-search-index-url="{{ include.search_index_url | default: '' }}"
>
  <aside class="docsViewer__sidebar" aria-label="Docs index">
    <div class="docsViewer__sidebarInner">
      <nav class="docsViewer__nav" id="docsViewerNav" aria-label="Docs tree"></nav>
    </div>
  </aside>

  <article class="docsViewer__main" aria-live="polite">
    <div class="docsViewer__mainHeader">
      {%- if include.search_index_url -%}
      <div class="docsViewer__searchRow">
        <div class="docsViewer__search">
          <label class="visually-hidden" for="docsViewerSearchInput">{{ include.search_aria_label | default: 'Search docs' }}</label>
          <input
            class="docsViewer__searchInput"
            id="docsViewerSearchInput"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="{{ include.search_placeholder | default: 'search docs' }}"
            aria-label="{{ include.search_aria_label | default: 'Search docs' }}"
          >
        </div>
        {%- if include.show_rebuild_button -%}
        <button class="docsViewer__actionButton" type="button" id="docsViewerRebuildButton">
          {{ include.rebuild_button_label | default: 'Rebuild docs' }}
        </button>
        {%- endif -%}
      </div>
      {%- endif -%}
      <p class="docsViewer__status muted small" id="docsViewerStatus">Loading docs...</p>
    </div>
    <div class="docsViewer__meta" id="docsViewerMeta" hidden>
      <p class="docsViewer__path small" id="docsViewerPath"></p>
      <p class="docsViewer__updated muted small" id="docsViewerUpdated"></p>
    </div>
    <div class="docsViewer__content content" id="docsViewerContent">
      <noscript>This docs viewer requires JavaScript to load the generated docs index.</noscript>
    </div>
    <ol class="docsViewer__results" id="docsViewerResults" hidden></ol>
    <div class="docsViewer__more" id="docsViewerMore" hidden></div>
  </article>
</section>

<script src="{{ '/assets/js/docs-viewer.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
