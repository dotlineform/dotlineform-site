name: Public site

on:
  pull_request:
    paths:
      - ".github/workflows/public-site.yml"
      - "bin/site-validate"
      - "site/**"
      - "site-tools/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-site-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Pages artifact
    runs-on: ubuntu-latest
    outputs:
      deploy-enabled: ${{ steps.deploy-gate.outputs.enabled }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate static site
        run: python site-tools/site_validate.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Evaluate deployment gate
        id: deploy-gate
        env:
          PUBLIC_SITE_PAGES_DEPLOY_ENABLED: ${{ vars.PUBLIC_SITE_PAGES_DEPLOY_ENABLED }}
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" && "$PUBLIC_SITE_PAGES_DEPLOY_ENABLED" == "true" && ( "$GITHUB_EVENT_NAME" == "push" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ) ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Pages artifact
    needs: validate
    if: ${{ needs.validate.outputs.deploy-enabled == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
