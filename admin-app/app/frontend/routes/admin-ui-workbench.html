<div
  class="adminWorkbench"
  id="adminUiWorkbenchRoot"
  data-admin-route="admin-ui-workbench"
  data-admin-ready="false"
  data-admin-busy="false"
>
  <section class="tagStudio__panel adminWorkbench__controlsPanel">
    <div class="adminWorkbench__controls">
      <div class="adminWorkbench__controlColumn">
        <label class="adminWorkbench__field" id="adminUiWorkbenchAppField" hidden>
          <span>app</span>
          <select class="tagStudio__input" id="adminUiWorkbenchApp"></select>
        </label>
        <label class="adminWorkbench__field">
          <span>specimen</span>
          <select class="tagStudio__input" id="adminUiWorkbenchSpecimen" disabled></select>
        </label>
        <label class="adminWorkbench__field">
          <span>review recipe</span>
          <select class="tagStudio__input" id="adminUiWorkbenchRecipe" disabled>
            <option value="">Single specimen</option>
          </select>
        </label>
        <label class="adminWorkbench__field" id="adminUiWorkbenchRecipeStepField" hidden>
          <span>review specimen</span>
          <select class="tagStudio__input" id="adminUiWorkbenchRecipeStep"></select>
        </label>
      </div>
      <div class="adminWorkbench__controlColumn">
        <div class="adminWorkbench__field">
          <span>theme</span>
          <button
            class="tagStudio__button adminWorkbench__toggle"
            id="adminUiWorkbenchTheme"
            type="button"
            data-value="light"
            aria-label="Theme: light. Switch to dark."
            aria-pressed="false"
          >
            <span data-workbench-toggle-value>light</span>
            <span class="adminWorkbench__toggleIcon" aria-hidden="true">↔</span>
          </button>
        </div>
        <div class="adminWorkbench__field">
          <span>viewport</span>
          <button
            class="tagStudio__button adminWorkbench__toggle"
            id="adminUiWorkbenchViewport"
            type="button"
            data-value="desktop"
            aria-label="Viewport: desktop. Switch to 390 by 844."
            aria-pressed="false"
          >
            <span data-workbench-toggle-value>desktop</span>
            <span class="adminWorkbench__toggleIcon" aria-hidden="true">↔</span>
          </button>
        </div>
      </div>
    </div>
    <section class="adminWorkbench__recipeDetail" id="adminUiWorkbenchRecipeDetail" hidden>
      <h2 id="adminUiWorkbenchRecipeQuestion"></h2>
      <p id="adminUiWorkbenchRecipeDimensions"></p>
    </section>
    <p class="tagStudio__status" id="adminUiWorkbenchStatus" hidden></p>
  </section>
  <section class="tagStudio__panel adminWorkbench__stagePanel">
    <div class="adminWorkbench__stages" id="adminUiWorkbenchStages">
      <section class="adminWorkbench__stage">
        <div class="adminWorkbench__stageHeader">
          <h2 id="adminUiWorkbenchPrimaryHeading">primary</h2>
          <button
            class="adminWorkbench__remountButton"
            id="adminUiWorkbenchPrimaryRemount"
            type="button"
            aria-label="Redisplay primary specimen"
            title="Redisplay specimen"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
              <path d="M20 4v7h-7"></path>
            </svg>
          </button>
        </div>
        <div class="adminWorkbench__frameShell" data-workbench-viewport="desktop">
          <iframe
            class="adminWorkbench__specimenFrame"
            id="adminUiWorkbenchPrimaryFrame"
            title="Primary UI Workbench specimen"
          ></iframe>
        </div>
      </section>
      <section class="adminWorkbench__stage" id="adminUiWorkbenchComparisonStage" hidden>
        <div class="adminWorkbench__stageHeader">
          <h2 id="adminUiWorkbenchComparisonHeading">comparison</h2>
          <button
            class="adminWorkbench__remountButton"
            id="adminUiWorkbenchComparisonRemount"
            type="button"
            aria-label="Redisplay comparison specimen"
            title="Redisplay specimen"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66"></path>
              <path d="M20 4v7h-7"></path>
            </svg>
          </button>
        </div>
        <div class="adminWorkbench__frameShell" data-workbench-viewport="desktop">
          <iframe
            class="adminWorkbench__specimenFrame"
            id="adminUiWorkbenchComparisonFrame"
            title="Comparison UI Workbench specimen"
          ></iframe>
        </div>
      </section>
    </div>
  </section>
</div>
