# Site identity
title: dotlineform
url: "https://www.dotlineform.com"
baseurl: ""  # custom domain: leave empty
live_url: "https://www.dotlineform.com"
docs_viewer_management_enabled: false
docs_viewer_config_url: "/docs-viewer/config/defaults/docs-viewer-public-config.json"
docs_viewer_links_enabled: true
docs_viewer_link_fallback: "host_route"
docs_viewer_service_required_for_public_routes: false

# Thumbnails (local repo
# (thumb_base is to let thumbnail URLs come from a different origin than the site itself. Set to "" to serve from repo, or a full URL to serve from a different origin.)
thumb_base: ""
thumb_works: "/assets/works/img"
thumb_work_details: "/assets/work_details/img"
thumb_moments: "/assets/moments/img"

# Media (R2):
media_base: "https://media.dotlineform.com"
media_image_works: "/works/img"
media_files_works: "/works/files"
media_image_work_details: "/work_details/img"
media_image_moments: "/moments/img"

# Home hero media origin/prefix (served remotely, no /assets segment):
home_media_base: "https://media.dotlineform.com"
home_media_prefix: "/home/img"

# Local fallback (serve work media from this repo):
# media_base: ""
# media_image_works: "/assets/works/img"
# media_image_work_details: "/assets/work_details/img"
# media_files_works: "/assets/works/files"

# Re-apply hash-anchor scrolling on work pages after async detail sections render.
# Keep true unless you explicitly want to suppress jump-to-section on return from detail pages.
enable_details_hash_scroll: true

public_runtime_text:
  loading: "loading..."
  unavailable: "info not available"

collections:
  works:
    output: true
    permalink: /works/:name/
  work_details:
    output: true
    permalink: /work_details/:name/
  series:
    output: true
    permalink: /series/:name/
  studio_works:
    output: true
    permalink: /studio/studio-works/:name/
  moments:
    output: true
    permalink: /moments/:name/

# Any document can set published: false in its front matter to hide it from site.<collection> output/build.
# no default has been set, so all documents are published by default.
# This allows us to control visibility on a per-document basis without needing to set published: true for every document.
defaults:
  - scope:
      path: ""
      type: works
    values:
      layout: work
  - scope:
      path: ""
      type: work_details
    values:
      layout: work_details
  - scope:
      path: ""
      type: series
    values:
      layout: series
  - scope:
      path: ""
      type: moments
    values:
      layout: moment
  
  # Apply default layout automatically to other pages
  - scope:
      path: ""
    values:
      layout: default

timezone: Europe/London
exclude:
  - scripts
  - _site
  - vendor
  - node_modules
  - .bundle
  - .pytest_cache
  - var
  - logs
  - docs/
  - studio/app/
  - studio/commands/
  - studio/data/
  - studio/services/
  - studio/shared/
  - studio/workflows/
  - studio/checks/
  - studio/tests/
  - studio/docs-viewer/build/
  - docs-viewer/config/defaults/docs-viewer-config.json
  - docs-viewer/config/defaults/docs-viewer-service.json
  - docs-viewer/config/reports/
  - docs-viewer/config/schema/
  - docs-viewer/config/scopes/
  - docs-viewer/source/
  - studio/docs-viewer/server/
  - studio/docs-viewer/services/
  - studio/docs-viewer/source-assets/
  - studio/docs-viewer/tests/
  - studio/ui-catalogue/
  - assets/data/docs/scopes/studio/
  - assets/data/search/studio/
