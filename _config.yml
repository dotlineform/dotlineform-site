# Site identity
title: dotlineform
url: "https://www.dotlineform.com"
baseurl: ""  # custom domain: leave empty
live_url: "https://www.dotlineform.com"

# Thumbnail origin (local repo)
thumb_base: ""
thumb_works: "/assets/works/img"
thumb_work_details: "/assets/work_details/img"

# Media origin for work images/files (R2):
media_base: "https://media.dotlineform.com"
media_image_works: "/works/img"
media_image_work_details: "/work_details/img"
media_files_works: "/works/files"

# Other media path prefixes
media_prefix: ""

# Home hero media origin/prefix (served remotely, no /assets segment):
home_media_base: "https://media.dotlineform.com"
home_media_prefix: "/home/img"

# Local fallback (serve work media from this repo):
# media_base: ""
# media_image_works: "/assets/works/img"
# media_image_work_details: "/assets/work_details/img"
# media_files_works: "/assets/works/files"

# Re-apply hash-anchor scrolling on work pages after async detail sections render.
# Keep true unless you explicitly want to suppress jump-to-section on return from detail pages.
enable_details_hash_scroll: true

collections:
  works:
    output: true
    permalink: /works/:name/
  work_details:
    output: true
    permalink: /work_details/:name/
  series:
    output: true
    permalink: /series/:name/
  studio_works:
    output: true
    permalink: /studio/studio-works/:name/
  themes:
    output: true
    permalink: /themes/:name/
  moments:
    output: true
    permalink: /moments/:name/
  research:
    output: true
    permalink: /research/:name/

# Any document can set published: false in its front matter to hide it from site.<collection> output/build.
# no default has been set, so all documents are published by default.
# This allows us to control visibility on a per-document basis without needing to set published: true for every document.
defaults:
  - scope:
      path: ""
      type: works
    values:
      layout: work
  - scope:
      path: ""
      type: work_details
    values:
      layout: work_details
  - scope:
      path: ""
      type: series
    values:
      layout: series
  - scope:
      path: ""
      type: themes
    values:
      layout: theme
  - scope:
      path: ""
      type: moments
    values:
      layout: moment
  - scope:
      path: ""
      type: research
    values:
      layout: research-note
  
  # Apply default layout automatically to other pages
  - scope:
      path: ""
    values:
      layout: default

timezone: Europe/London
exclude:
  - scripts
  - _site
  - vendor
  - node_modules
  - .bundle
